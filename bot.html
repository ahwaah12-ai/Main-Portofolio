    <style>
        :root {
            --p: #f59e0b;
            --bg: #0a0a0c;
            --card-bg: #111116;
            --glass: rgba(255, 255, 255, 0.05);
            --user-msg: #2563eb;
            --bot-msg: #1f2937;
        }

        body {
            margin: 0;
            background: var(--bg);
            color: white;
            font-family: 'Readex Pro', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100dvh;
            overflow: hidden;
        }

        .chat-card {
            width: 95%;
            max-width: 600px;
            height: 94dvh;
            background: var(--card-bg);
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.6);
        }

        .header {
            padding: 15px;
            text-align: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            position: relative;
        }

        .header h2 {
            margin: 0;
            color: var(--p);
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .chat-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px 15px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            scrollbar-width: none;
        }

        .msg {
            padding: 12px 16px;
            max-width: 85%;
            font-size: 0.95rem;
            line-height: 1.6;
            border-radius: 18px;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .bot {
            align-self: flex-start;
            background: var(--bot-msg);
            border-bottom-right-radius: 4px;
            border-right: 3px solid var(--p);
        }

        .user {
            align-self: flex-end;
            background: var(--user-msg);
            border-bottom-left-radius: 4px;
        }

        .typing {
            font-size: 0.8rem;
            color: var(--p);
            padding: 5px 20px;
            display: none;
            font-weight: bold;
        }

        .input-group {
            padding: 15px;
            display: flex;
            gap: 10px;
            background: #08080a;
            border-radius: 0 0 24px 24px;
        }

        input {
            flex: 1;
            background: #1a1a20;
            border: 1px solid #333;
            padding: 14px;
            border-radius: 14px;
            color: white;
            outline: none;
            font-family: inherit;
        }

        .send-btn {
            background: var(--p);
            width: 55px;
            border: none;
            border-radius: 14px;
            cursor: pointer;
            color: #000;
            font-size: 1.1rem;
        }

        #user_back {
            transition: all 0.4s ease-in-out;
            background-color: var(--user-msg);
            padding: 4px 10px;
            border-radius: 8px;
        }

        #user_back:hover {
            background-color: var(--glass) !important;
            transform: translateX(-2px);

        }

        @media (max-width: 480px) {
            .chat-card {
                width: 100%;
                height: 100dvh;
                border-radius: 0;
            }

            .input-group {
                padding-bottom: 30px;
            }
        }
    </style>
</head>

    async function send() {
        const input = document.getElementById('in');
        const userText = input.value.trim();
        if (!userText) return;

        addMsg(userText, 'user');
        chatHistory.push({ role: "user", content: userText });
        input.value = '';
        document.getElementById('type').style.display = 'block';

        try {
            // استخدمنا "cors-anywhere" أو بروكزي وسيط عشان نتخطى المنع
            const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                method: "POST",
                headers: {
                    "Authorization": `Bearer ${API_KEY}`,
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    model: "llama3-8b-8192",
                    messages: chatHistory,
                    temperature: 0.7
                })
            });

            if (!response.ok) {
                const errorData = await response.json();
                throw new Error(errorData.error.message || "API Error");
            }

            const data = await response.json();
            const aiReply = data.choices[0].message.content;

            chatHistory.push({ role: "assistant", content: aiReply });
            document.getElementById('type').style.display = 'none';
            addMsg(aiReply, 'bot');

        } catch (e) {
            console.error("Error details:", e);
            document.getElementById('type').style.display = 'none';
            addMsg("فيه مشكلة في السيرفر حالياً، جرب كمان شوية يا هندسة ⚠️", 'bot');
        }
    }

    function addMsg(text, type) {
        const box = document.getElementById('box');
        const div = document.createElement('div');
        div.className = `msg ${type}`;
        div.innerText = text;
        box.appendChild(div);
        box.scrollTo({ top: box.scrollHeight, behavior: 'smooth' });
    }

    document.addEventListener('contextmenu', (e) => e.preventDefault());
    document.onkeydown = function (e) {
        if (e.keyCode == 123 || (e.ctrlKey && e.shiftKey && (e.keyCode == 'I'.charCodeAt(0) || e.keyCode == 'C'.charCodeAt(0) || e.keyCode == 'J'.charCodeAt(0))) || (e.ctrlKey && e.keyCode == 'U'.charCodeAt(0))) {
            return false;
        }
    };


        document.addEventListener('contextmenu', (e) => e.preventDefault());
